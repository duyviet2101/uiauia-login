name: Release

# Build installers on native macOS + Windows runners, then publish ONE release
# with all artifacts. We deliberately do NOT use electron-builder's GitHub
# publisher: with a parallel matrix it races and creates duplicate draft
# releases. Instead each job uploads artifacts, and a final job attaches them
# to a single published release for the pushed tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  fonts:
    # Collect a complete Windows font set once, on a Windows runner, so every
    # installer (including the macOS dmg) can sandbox font enumeration to it and
    # hide host fonts on windows-spoof profiles. These fonts are NEVER committed
    # to the repo (Microsoft font license) — they live only in this CI artifact.
    runs-on: windows-latest
    steps:
      - name: Copy Windows system fonts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/fonts/windows | Out-Null
          Get-ChildItem -Path "$env:WINDIR\Fonts\*" -Include *.ttf,*.ttc,*.otf -File |
            Copy-Item -Destination build/fonts/windows -Force
          $count = (Get-ChildItem build/fonts/windows -File | Measure-Object).Count
          Write-Host "Collected $count Windows font files"
          if ($count -lt 50) { throw "Expected a complete Windows font set, got only $count files" }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-fonts
          path: build/fonts/windows
          if-no-files-found: error
          # Internal inter-job plumbing only — keep the MS fonts out of long-lived
          # CI storage. They ship bundled INSIDE the installers, never as loose files.
          retention-days: 1

  build:
    needs: fonts
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--mac'
          - os: windows-latest
            args: '--win'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Pull in the Windows font set so electron-builder's extraResources bundles
      # it into both the .exe and the .dmg (Mac hosts running windows-spoof too).
      - name: Fetch bundled Windows fonts
        uses: actions/download-artifact@v4
        with:
          name: windows-fonts
          path: build/fonts/windows

      - name: Build installer (no publish)
        run: npx electron-builder ${{ matrix.args }} --publish never

      - name: Verify update metadata assets
        run: node scripts/verify-update-metadata.mjs dist

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          # Only the installer artifacts — NOT the windows-fonts plumbing artifact,
          # so raw MS font files never get attached to the public release.
          pattern: installers-*
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
