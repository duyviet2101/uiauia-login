name: Release

# Build installers on native macOS + Windows runners, then publish ONE release
# with all artifacts. We deliberately do NOT use electron-builder's GitHub
# publisher: with a parallel matrix it races and creates duplicate draft
# releases. Instead each job uploads artifacts, and a final job attaches them
# to a single published release for the pushed tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--mac'
          - os: windows-latest
            args: '--win'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build installer (no publish)
        run: npx electron-builder ${{ matrix.args }} --publish never

      - name: Verify update metadata assets
        run: node scripts/verify-update-metadata.mjs dist

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
