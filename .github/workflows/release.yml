name: Release

# Build installers on real macOS + Windows runners and attach them to the
# GitHub Release matching the pushed tag (e.g. v0.1.1). Building the Windows
# NSIS installer on a real Windows runner avoids the "integrity check failed"
# corruption that happens when cross-building from macOS via Wine.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--mac'
          - os: windows-latest
            args: '--win'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build & publish installer
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
