appId: com.cloakbrowser.manager
productName: CloakBrowser Manager
copyright: Copyright © 2026

# Keep appId stable across versions so macOS/Windows preserve the user's data
# directory (profiles + sessions) when a new build is installed over the old.

# Where releases live. Used by `electron-builder --publish` to upload, and the
# in-app update check reads the same repo's "latest release" tag.
publish:
  provider: github
  owner: duyviet2101
  repo: uiauia-login

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - node_modules/**/*

# macOS
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - arm64
        - x64

dmg:
  title: CloakBrowser Manager

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# Linux intentionally omitted — only built when `electron-builder --linux` is run.
