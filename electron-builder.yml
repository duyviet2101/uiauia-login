appId: com.cloakbrowser.manager
productName: CloakBrowser Manager
copyright: Copyright © 2026

# Keep appId stable across versions so macOS/Windows preserve the user's data
# directory (profiles + sessions) when a new build is installed over the old.

# Where releases live. Used by `electron-builder --publish` to upload, and the
# in-app update check reads the same repo's "latest release" tag.
publish:
  provider: github
  owner: duyviet2101
  repo: uiauia-login

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - node_modules/**/*

asarUnpack:
  - node_modules/koffi/**/*
  - node_modules/@koromix/koffi-*/**/*

# No bundled fonts: --fingerprint-fonts-dir is a no-op on Windows (DirectWrite),
# so a font bundle gave no benefit and re-introduced MS-font license risk. Host
# fonts stay blocked from queryLocalFonts (local_fonts:2) and host-font leaks are
# surfaced via diagnostics instead.

# macOS
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - arm64
        - x64

dmg:
  title: CloakBrowser Manager
  # Keep the physical filename identical to the URL written to latest-mac.yml.
  # GitHub sanitizes spaces in release asset names differently from electron-builder.
  artifactName: CloakBrowser-Manager-${version}-${arch}.${ext}

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # A space-free name prevents GitHub's asset URL from diverging from latest.yml.
  artifactName: CloakBrowser-Manager-Setup-${version}.${ext}

# Linux intentionally omitted — only built when `electron-builder --linux` is run.
